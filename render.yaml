# render.yaml — مخطط نشر Render (Blueprint) — متوافق مع الباقة المجانية
# ارفع المشروع على GitHub ثم: Render Dashboard > New > Blueprint واختر المستودع.
# املأ قيم OPENROUTER_API_KEY (و TAVILY_API_KEY اختيارياً) من لوحة Render.

services:
  # خدمة الويب (واجهة Streamlit + جدولة داخلية للرادار)
  - type: web
    name: personal-ai-oracle
    runtime: docker
    plan: free            # الخطة المجانية تنام عند الخمول → الجدولة الداخلية تتوقف مؤقتاً
    healthCheckPath: /_stcore/health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false        # تُدخَل يدوياً (سرّية)
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-chat
      - key: SCAN_INTERVAL_HOURS
        value: "12"
      - key: ENABLE_RADAR
        value: "1"
      - key: ORACLE_DB_PATH
        value: /data/oracle.db   # ملاحظة: على المجانية البيانات مؤقتة (تُمسح عند إعادة النشر)
